name: Deploy to GitHub Pages

# main に push されるたびに Vite でビルドして GitHub Pages へ公開する。
# 手動実行も可能（Actions タブの "Run workflow"）。
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages デプロイ（OIDC）に必要な権限。
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つに絞る（進行中のものはキャンセルしない）。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
